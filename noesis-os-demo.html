        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
        }
        .card {
            backdrop-filter: blur(10px);
            background: rgba(255, 255, 255, 0.95);
            border-radius: 16px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
        }
        .nav-item {
            transition: all 0.3s ease;
        }
        .nav-item:hover {
            transform: translateX(8px);
            background: rgba(102, 126, 234, 0.1);
        }
        .nav-item.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        .kpi-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-radius: 12px;
            padding: 1.5rem;
            transition: transform 0.3s ease;
        }
        .kpi-card:hover {
            transform: translateY(-4px);
        }
        .status-badge {
            padding: 0.25rem 0.75rem;
            border-radius: 9999px;
            font-size: 0.875rem;
            font-weight: 600;
        }
        .status-aperto { background: #fee2e2; color: #991b1b; }
        .status-chiuso { background: #d1fae5; color: #065f46; }
        .status-in-corso { background: #dbeafe; color: #1e40af; }
        .status-confermato { background: #d1fae5; color: #065f46; }
        .status-completato { background: #e5e7eb; color: #374151; }
        .table-row {
            transition: background 0.2s ease;
        }
        .table-row:hover {
            background: rgba(102, 126, 234, 0.05);
        }
        #content {
            min-height: 600px;
        }
    </style>

        // Navigation function
        function showPage(pageId) {
            // Update content
            document.getElementById('content').innerHTML = pages[pageId]();

            // Update active nav item
            document.querySelectorAll('.nav-item').forEach(item => {
                item.classList.remove('active');
            });
            event.target.closest('.nav-item').classList.add('active');

            // Scroll to top
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        // Load dashboard on page load

            showPage('dashboard');
